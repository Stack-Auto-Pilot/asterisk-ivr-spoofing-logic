; [sip24-testing-menu]
; Advanced IVR System for SIP-Trunk & Caller-ID-Spoofing Verification

[sip24-ivr]
exten => s,1,Answer()
 same => n,Wait(1)
 same => n,Playback(welcome-to-testing-menu) ; You need this .gsm or .wav file
 same => n(menu),Background(press-1-for-spoofing-press-2-for-echo)
 same => n,WaitExten(5)

; Identity Management / Spoofing Test
exten => 1,1,Log(NOTICE, Starting Caller-ID-Spoofing Test)
 same => n,Read(NEW_CID,please-enter-the-spoofed-number,11)
 same => n,Set(CALLERID(num)=${NEW_CID})
 same => n,Read(DESTINATION,please-enter-destination-number,11)
 same => n,Dial(PJSIP/${DESTINATION}@sip24-trunk)
 same => n,Hangup()

; Quality & Latency Test
exten => 2,1,Goto(demo-echotest,s,1)

; Error Handling
exten => i,1,Playback(invalid-option)
 same => n,Goto(s,menu)

exten => t,1,Hangup()
